version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: competitions_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ***
    ports:
      - "7431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d competitions_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:tennissuper369@db:5432/competitions_db
      SECRET_KEY: dev-secret-key-2025
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "5173:5173"

volumes:
  pgdata:
  uploads_data:
